<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ Галерея образов Винкс — с музыкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Quicksand', cursive;
            background: linear-gradient(135deg, #1a0b2e, #2d1b4e, #4a2c6d);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-block;
            background: #b77dcc;
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-bottom: 25px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #9b5fb0;
            transform: scale(1.02);
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #ff69b4;
        }

        .subtitle {
            text-align: center;
            color: #ffe4f0;
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .gallery-card {
            background: rgba(255, 245, 250, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 45px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 245, 250, 0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card-image {
            text-align: center;
            margin-bottom: 15px;
        }

        .card-image img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            border-radius: 35px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            transition: 0.3s;
        }

        .gallery-card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 10px;
        }

        .music-player {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 10px 15px;
            margin: 15px 0;
        }

        .music-player audio {
            width: 100%;
            height: 40px;
            border-radius: 30px;
            margin-bottom: 8px;
        }

        .music-player audio::-webkit-media-controls-panel {
            background: #ffd0e4;
        }

        .music-link {
            font-size: 0.75rem;
            color: #ffb7ce;
            word-break: break-all;
            text-align: center;
            margin-top: 5px;
        }

        .no-music {
            font-size: 0.8rem;
            color: #ffb7ce;
            font-style: italic;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }

        .music-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .upload-music-btn, .add-link-btn, .remove-music-btn {
            background: #d44c8f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-link-btn {
            background: #6a4c9b;
        }

        .remove-music-btn {
            background: #ff6b6b;
        }

        .upload-music-btn:hover, .add-link-btn:hover {
            background: #ff69b4;
        }

        .remove-music-btn:hover {
            background: #ff4444;
        }

        .delete-card-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 107, 107, 0.8);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .delete-card-btn:hover {
            background: #ff4444;
            transform: scale(1.1);
        }

        /* Форма добавления */
        .add-form {
            background: rgba(255, 245, 250, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 55px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .add-form h3 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5rem;
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            color: #ffe4f0;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 40px;
            border: 1px solid #ffb7ce;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
        }

        .add-btn {
            background: #d44c8f;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
            transition: 0.2s;
        }

        .add-btn:hover {
            background: #ff69b4;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #d4b8e8;
            font-size: 0.85rem;
        }

        .storage-status {
            text-align: center;
            margin-bottom: 20px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            font-size: 0.8rem;
            color: #ffd700;
        }

        @media (max-width: 700px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">✨ ← Вернуться в мир Винкс</a>
    <h1>🖼️ Магическая галерея образов</h1>
    <p class="subtitle">🎵 Каждый образ может звучать по-своему! MP3 до 10 МБ или ссылка на музыку 🎵</p>

    <div class="storage-status" id="storageStatus">💾 Загрузка...</div>

    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Форма добавления -->
    <div class="add-form">
        <h3>✨ Добавить свой образ ✨</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>📸 Изображение</label>
                <input type="file" id="newImageInput" accept="image/*">
            </div>
            <div class="form-group">
                <label>🏷️ Название образа</label>
                <input type="text" id="newNameInput" placeholder="Например: Моя фея">
            </div>
            <div class="form-group">
                <label>🎵 MP3 файл (до 10 МБ)</label>
                <input type="file" id="newMusicInput" accept="audio/mpeg, audio/mp3">
            </div>
            <div class="form-group">
                <label>🔗 Или ссылка на музыку</label>
                <input type="text" id="newLinkInput" placeholder="https://example.com/music.mp3">
            </div>
            <button class="add-btn" id="addNewItemBtn">➕ Добавить образ</button>
        </div>
        <p class="info-text">💡 Музыка сохраняется в IndexedDB (до 100 МБ). Можно загрузить MP3 или вставить ссылку!</p>
    </div>
</div>

<script>
    // ==================== РАБОТА С INDEXEDDB ====================
    const DB_NAME = 'WinxGalleryDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'galleryItems';
    
    let db = null;
    let galleryItems = [];

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    store.createIndex('name', 'name', { unique: false });
                }
            };
        });
    }

    async function loadAllItems() {
        if (!db) await openDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readonly');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveItem(item) {
        if (!db) await openDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.put(item);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteItemFromDB(id) {
        if (!db) await openDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function getStorageEstimate() {
        if ('storage' in navigator && 'estimate' in navigator.storage) {
            const estimate = await navigator.storage.estimate();
            const used = estimate.usage || 0;
            const quota = estimate.quota || 0;
            return { used, quota, percent: (used / quota) * 100 };
        }
        return { used: 0, quota: 0, percent: 0 };
    }

    async function updateStorageDisplay() {
        const { used, quota, percent } = await getStorageEstimate();
        const usedMB = (used / 1024 / 1024).toFixed(1);
        const quotaMB = (quota / 1024 / 1024).toFixed(0);
        const statusDiv = document.getElementById('storageStatus');
        if (quota > 0) {
            statusDiv.innerHTML = `💾 Хранилище: ${usedMB} МБ / ${quotaMB} МБ (${percent.toFixed(0)}%) ${percent > 80 ? '⚠️ Почти заполнено!' : '✨ Достаточно места'}`;
        } else {
            statusDiv.innerHTML = `💾 Хранилище: ${usedMB} МБ / ~100 МБ доступно`;
        }
    }

    // ==================== НАЧАЛЬНЫЕ ДАННЫЕ ====================
    async function initDefaultData() {
        const existing = await loadAllItems();
        if (existing.length === 0) {
            const defaultItems = [
                { id: 1, name: '🔥 Блум — Драконье пламя', imageData: 'images/fairy_fire.png', musicData: null, musicLink: null, musicName: null },
                { id: 2, name: '☀️ Стелла — Солнечная', imageData: 'images/fairy_light.png', musicData: null, musicLink: null, musicName: null },
                { id: 3, name: '🌸 Флора — Природа', imageData: 'images/fairy_flower.png', musicData: null, musicLink: null, musicName: null },
                { id: 4, name: '💧 Лейла — Волны', imageData: 'images/fairy_water.png', musicData: null, musicLink: null, musicName: null },
                { id: 5, name: '🎵 Муза — Гармония', imageData: 'images/fairy_magic.png', musicData: null, musicLink: null, musicName: null },
                { id: 6, name: '⚙️ Текна — Техномагия', imageData: 'images/fairy_nature.png', musicData: null, musicLink: null, musicName: null }
            ];
            for (const item of defaultItems) {
                await saveItem(item);
            }
        }
    }

    // ==================== ОТРИСОВКА ====================
    async function renderGallery() {
        galleryItems = await loadAllItems();
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';
        
        for (const item of galleryItems) {
            const card = document.createElement('div');
            card.className = 'gallery-card';
            card.setAttribute('data-id', item.id);
            
            let imageSrc = item.imageData;
            if (!imageSrc || imageSrc === '' || imageSrc.startsWith('null')) {
                imageSrc = 'https://via.placeholder.com/150?text=✨Фея✨';
            }
            
            // Музыкальный блок
            let musicHtml = '';
            if (item.musicData) {
                musicHtml = `
                    <div class="music-player">
                        <audio controls src="${item.musicData}"></audio>
                        <div class="music-buttons">
                            <button class="remove-music-btn" data-id="${item.id}" data-action="remove-music">🗑️ Удалить музыку</button>
                        </div>
                    </div>
                `;
            } else if (item.musicLink) {
                musicHtml = `
                    <div class="music-player">
                        <audio controls src="${item.musicLink}"></audio>
                        <div class="music-link">🔗 ${item.musicLink.substring(0, 50)}${item.musicLink.length > 50 ? '...' : ''}</div>
                        <div class="music-buttons">
                            <button class="remove-music-btn" data-id="${item.id}" data-action="remove-music">🗑️ Удалить музыку</button>
                        </div>
                    </div>
                `;
            } else {
                musicHtml = `
                    <div class="music-player">
                        <span class="no-music">🎵 Нет музыки</span>
                        <div class="music-buttons">
                            <button class="upload-music-btn" data-id="${item.id}" data-action="upload-music">📁 Загрузить MP3</button>
                            <button class="add-link-btn" data-id="${item.id}" data-action="add-link">🔗 Добавить ссылку</button>
                        </div>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <button class="delete-card-btn" data-id="${item.id}" data-action="delete-card">🗑️</button>
                <div class="card-image">
                    <img src="${imageSrc}" alt="${escapeHtml(item.name)}" onerror="this.src='https://via.placeholder.com/150?text=✨'">
                </div>
                <div class="card-name">${escapeHtml(item.name)}</div>
                ${musicHtml}
            `;
            
            grid.appendChild(card);
        }
        
        attachEventHandlers();
        await updateStorageDisplay();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ==================== ОБРАБОТЧИКИ ====================
    function attachEventHandlers() {
        document.querySelectorAll('.upload-music-btn').forEach(btn => {
            btn.removeEventListener('click', handleUploadMusic);
            btn.addEventListener('click', handleUploadMusic);
        });
        
        document.querySelectorAll('.add-link-btn').forEach(btn => {
            btn.removeEventListener('click', handleAddLink);
            btn.addEventListener('click', handleAddLink);
        });
        
        document.querySelectorAll('.remove-music-btn').forEach(btn => {
            btn.removeEventListener('click', handleRemoveMusic);
            btn.addEventListener('click', handleRemoveMusic);
        });
        
        document.querySelectorAll('.delete-card-btn').forEach(btn => {
            btn.removeEventListener('click', handleDeleteCard);
            btn.addEventListener('click', handleDeleteCard);
        });
    }
    
    async function handleUploadMusic(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        const item = galleryItems.find(i => i.id === id);
        if (!item) return;
        
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'audio/mpeg, audio/mp3';
        
        fileInput.onchange = async (event) => {
            const file = event.target.files[0];
            if (file && file.type.includes('audio')) {
                // Проверка размера: максимум 10 МБ
                if (file.size > 10 * 1024 * 1024) {
                    showNotice('❌ Файл больше 10 МБ. Пожалуйста, выбери музыку меньшего размера или используй ссылку!');
                    return;
                }
                
                // Проверка свободного места
                const { used, quota } = await getStorageEstimate();
                if (quota > 0 && used + file.size > quota * 0.9) {
                    showNotice('⚠️ Недостаточно места в хранилище! Удали ненужную музыку.');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = async (loadEvent) => {
                    item.musicData = loadEvent.target.result;
                    item.musicLink = null;
                    item.musicName = file.name;
                    await saveItem(item);
                    await renderGallery();
                    showNotice(`🎵 Музыка "${file.name}" добавлена! 🎵`);
                };
                reader.readAsDataURL(file);
            } else {
                showNotice('❌ Пожалуйста, выбери MP3 файл!');
            }
        };
        
        fileInput.click();
    }
    
    async function handleAddLink(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        const item = galleryItems.find(i => i.id === id);
        if (!item) return;
        
        const link = prompt('🔗 Вставь ссылку на музыку (MP3, прямую ссылку):', 'https://example.com/music.mp3');
        if (link && link.trim()) {
            if (link.startsWith('http://') || link.startsWith('https://')) {
                item.musicLink = link.trim();
                item.musicData = null;
                await saveItem(item);
                await renderGallery();
                showNotice(`🎵 Ссылка на музыку добавлена!`);
            } else {
                showNotice('❌ Ссылка должна начинаться с http:// или https://');
            }
        }
    }
    
    async function handleRemoveMusic(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        const item = galleryItems.find(i => i.id === id);
        if (item) {
            item.musicData = null;
            item.musicLink = null;
            item.musicName = null;
            await saveItem(item);
            await renderGallery();
            showNotice(`🎵 Музыка удалена из "${item.name}"`);
        }
    }
    
    async function handleDeleteCard(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        if (confirm('Удалить этот образ из галереи?')) {
            await deleteItemFromDB(id);
            await renderGallery();
            showNotice('✨ Образ удалён из галереи ✨');
        }
    }
    
    // ==================== ДОБАВЛЕНИЕ НОВОГО ОБРАЗА ====================
    async function addNewItem() {
        const imageInput = document.getElementById('newImageInput');
        const nameInput = document.getElementById('newNameInput');
        const musicInput = document.getElementById('newMusicInput');
        const linkInput = document.getElementById('newLinkInput');
        
        const name = nameInput.value.trim();
        const imageFile = imageInput.files[0];
        const musicFile = musicInput.files[0];
        const musicLink = linkInput.value.trim();
        
        if (!name) {
            showNotice('✏️ Введи название образа!');
            return;
        }
        
        if (!imageFile) {
            showNotice('📸 Выбери картинку для образа!');
            return;
        }
        
        // Получаем новый ID
        const maxId = Math.max(...galleryItems.map(i => i.id), 0);
        const newId = maxId + 1;
        
        // Читаем картинку
        const imgReader = new FileReader();
        imgReader.onload = async (imgEvent) => {
            const newItem = {
                id: newId,
                name: name,
                imageData: imgEvent.target.result,
                musicData: null,
                musicLink: null,
                musicName: null
            };
            
            // Если есть MP3 файл
            if (musicFile && musicFile.type.includes('audio')) {
                if (musicFile.size > 10 * 1024 * 1024) {
                    showNotice('❌ MP3 файл больше 10 МБ. Используй ссылку или сожми файл.');
                } else {
                    const { used, quota } = await getStorageEstimate();
                    if (quota > 0 && used + musicFile.size > quota * 0.9) {
                        showNotice('⚠️ Недостаточно места!');
                    } else {
                        const musicReader = new FileReader();
                        musicReader.onload = async (musicEvent) => {
                            newItem.musicData = musicEvent.target.result;
                            await saveItem(newItem);
                            await renderGallery();
                            clearAddForm();
                            showNotice(`✨ "${name}" добавлен с музыкой! ✨`);
                        };
                        musicReader.readAsDataURL(musicFile);
                        return;
                    }
                }
            }
            
            // Если есть ссылка
            if (musicLink && (musicLink.startsWith('http://') || musicLink.startsWith('https://'))) {
                newItem.musicLink = musicLink;
            }
            
            await saveItem(newItem);
            await renderGallery();
            clearAddForm();
            showNotice(`✨ "${name}" добавлен! ✨`);
        };
        imgReader.readAsDataURL(imageFile);
    }
    
    function clearAddForm() {
        document.getElementById('newImageInput').value = '';
        document.getElementById('newNameInput').value = '';
        document.getElementById('newMusicInput').value = '';
        document.getElementById('newLinkInput').value = '';
    }
    
    function showNotice(msg) {
        const notice = document.createElement('div');
        notice.innerText = msg;
        notice.style.position = 'fixed';
        notice.style.bottom = '20px';
        notice.style.left = '50%';
        notice.style.transform = 'translateX(-50%)';
        notice.style.background = '#d44c8f';
        notice.style.color = 'white';
        notice.style.padding = '10px 20px';
        notice.style.borderRadius = '40px';
        notice.style.zIndex = '9999';
        notice.style.fontWeight = 'bold';
        document.body.appendChild(notice);
        setTimeout(() => notice.remove(), 3000);
    }
    
    // ==================== ЗАПУСК ====================
    async function init() {
        await openDB();
        await initDefaultData();
        await renderGallery();
        
        document.getElementById('addNewItemBtn').addEventListener('click', addNewItem);
    }
    
    init();
</script>
</body>
</html>
