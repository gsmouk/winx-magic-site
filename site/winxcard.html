<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ Личная карта Винкс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', cursive;
            background: linear-gradient(135deg, #e0d4ff, #f5e6ff);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .back-btn {
            display: inline-block;
            background: #b77dcc;
            padding: 12px 25px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .card {
            border-radius: 65px;
            padding: 35px;
            box-shadow: 0 25px 45px rgba(128, 0, 128, 0.2);
            border: 3px solid #ffd700;
            transition: background 0.3s ease;
        }
        /* Фоны */
        .bg-1 { background: rgba(255, 248, 245, 0.95); }
        .bg-2 { background: linear-gradient(135deg, #d9e6ff, #ffe6f5); }
        .bg-3 { background: linear-gradient(145deg, #e0d4ff, #f9e0f0); }
        .bg-4 { background: radial-gradient(circle at 10% 30%, #fff0d0, #ffe0f5); }
        .bg-5 { background: repeating-linear-gradient(45deg, #fff0fa, #fff0fa 20px, #ffe6f0 20px, #ffe6f0 40px); }
        
        h1 {
            text-align: center;
            color: #8b3c6e;
            font-size: 2.3rem;
            margin-bottom: 30px;
        }
        .bg-selector {
            margin: 0 0 25px 0;
            text-align: center;
        }
        .bg-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .bg-btn {
            background: #f2c8e0;
            border: none;
            padding: 8px 15px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .bg-btn.active {
            background: #d44c8f;
            color: white;
        }
        .profile-area {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 35px;
        }
        .avatar-section {
            text-align: center;
            flex: 1;
            min-width: 200px;
        }
        .avatar-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 100px;
            border: 5px solid #ffb7d0;
            background: #f3d9e6;
            margin-bottom: 15px;
        }
        .info-section {
            flex: 2;
            min-width: 250px;
        }
        .info-row {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            color: #a13e6b;
            display: block;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 2px solid #ffbfd5;
            font-family: inherit;
            font-size: 1rem;
        }
        textarea {
            border-radius: 25px;
        }
        .save-btn {
            background: #d44c8f;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .preview-card {
            margin-top: 40px;
            background: rgba(255,240,245,0.7);
            border-radius: 50px;
            padding: 25px;
            text-align: center;
            border: 2px dashed #ff91b5;
        }
        .favorite-fairy {
            font-size: 2rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">✨ ← На главную</a>
        <div class="card bg-1" id="mainCard">
            <h1>🗺️ МОЯ ЛИЧНАЯ КАРТА КЛУБА ВИНКС</h1>
            
            <div class="bg-selector">
                <label>🎨 Магический фон карты:</label>
                <div class="bg-buttons">
                    <button class="bg-btn" data-bg="bg-1">✨ Классический</button>
                    <button class="bg-btn" data-bg="bg-2">💙 Небесный</button>
                    <button class="bg-btn" data-bg="bg-3">💜 Алфейский</button>
                    <button class="bg-btn" data-bg="bg-4">🌅 Закат Винкс</button>
                    <button class="bg-btn" data-bg="bg-5">🌸 Цветочный сад</button>
                </div>
            </div>

            <div class="profile-area">
                <div class="avatar-section">
                    <img id="avatarPreview" class="avatar-img" src="https://via.placeholder.com/180/ffc0cb/ffffff?text=Твоя+фея" alt="Аватар">
                    <br>
                    <input type="file" id="avatarUpload" accept="image/*">
                </div>
                <div class="info-section">
                    <div class="info-row">
                        <label>💖 Твоё волшебное имя:</label>
                        <input type="text" id="userName" placeholder="Например: Стелла, Флора...">
                    </div>
                    <div class="info-row">
                        <label>⭐ Любимая фея Винкс:</label>
                        <select id="favFairy">
                            <option value="Блум 🔥">Блум 🔥</option>
                            <option value="Стелла ☀️">Стелла ☀️</option>
                            <option value="Флора 🌸">Флора 🌸</option>
                            <option value="Лейла 💧">Лейла 💧</option>
                            <option value="Муза 🎵">Муза 🎵</option>
                            <option value="Текна ⚙️">Текна ⚙️</option>
                        </select>
                    </div>
                    <div class="info-row">
                        <label>📜 Магическая цитата:</label>
                        <textarea id="quote" rows="2" placeholder="Сила внутри нас! ✨"></textarea>
                    </div>
                </div>
            </div>
            <button class="save-btn" id="saveCardBtn">💾 СОХРАНИТЬ МОЮ КАРТУ 💾</button>
            <div class="preview-card">
                <h3>🌟 ПРЕВЬЮ ТВОЕЙ КАРТЫ 🌟</h3>
                <div id="previewContent">
                    <p><strong>Имя:</strong> <span id="previewName">—</span></p>
                    <p><strong>Любимая фея:</strong> <span id="previewFairy">—</span></p>
                    <p><strong>Цитата:</strong> <span id="previewQuote">—</span></p>
                    <div class="favorite-fairy" id="fairyEmoji">🧚‍♀️</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function loadSavedData() {
            document.getElementById('userName').value = localStorage.getItem('winx_name') || '';
            document.getElementById('favFairy').value = localStorage.getItem('winx_fairy') || 'Блум 🔥';
            document.getElementById('quote').value = localStorage.getItem('winx_quote') || '';
            const savedAvatar = localStorage.getItem('winx_avatar');
            if (savedAvatar) document.getElementById('avatarPreview').src = savedAvatar;
            updatePreview();
        }
        function updatePreview() {
            const name = document.getElementById('userName').value || 'Волшебница';
            const fairy = document.getElementById('favFairy').value;
            const quote = document.getElementById('quote').value || 'Магия дружбы ✨';
            document.getElementById('previewName').innerText = name;
            document.getElementById('previewFairy').innerText = fairy;
            document.getElementById('previewQuote').innerText = quote;
            let emoji = '🧚‍♀️';
            if (fairy.includes('Блум')) emoji = '🔥🧚‍♀️';
            else if (fairy.includes('Стелла')) emoji = '☀️🧚';
            else if (fairy.includes('Флора')) emoji = '🌸🧚';
            else if (fairy.includes('Лейла')) emoji = '💧🧚';
            else if (fairy.includes('Муза')) emoji = '🎵🧚';
            else if (fairy.includes('Текна')) emoji = '⚙️🧚';
            document.getElementById('fairyEmoji').innerHTML = emoji;
        }
        function saveAll() {
            localStorage.setItem('winx_name', document.getElementById('userName').value);
            localStorage.setItem('winx_fairy', document.getElementById('favFairy').value);
            localStorage.setItem('winx_quote', document.getElementById('quote').value);
            updatePreview();
            alert('✨ Карта сохранена! ✨');
        }
        document.getElementById('avatarUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const src = ev.target.result;
                    document.getElementById('avatarPreview').src = src;
                    localStorage.setItem('winx_avatar', src);
                };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById('userName').addEventListener('input', updatePreview);
        document.getElementById('favFairy').addEventListener('change', updatePreview);
        document.getElementById('quote').addEventListener('input', updatePreview);
        document.getElementById('saveCardBtn').addEventListener('click', saveAll);
        loadSavedData();

        // СМЕНА ФОНА
        const card = document.getElementById('mainCard');
        const bgBtns = document.querySelectorAll('.bg-btn');
        function setBg(bgClass) {
            card.classList.remove('bg-1','bg-2','bg-3','bg-4','bg-5');
            card.classList.add(bgClass);
            localStorage.setItem('winx_card_bg', bgClass);
            bgBtns.forEach(btn => {
                if (btn.dataset.bg === bgClass) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        bgBtns.forEach(btn => {
            btn.addEventListener('click', () => setBg(btn.dataset.bg));
        });
        const savedBg = localStorage.getItem('winx_card_bg');
        if (savedBg) setBg(savedBg);
        else setBg('bg-1');
    </script>
</body>
</html>
