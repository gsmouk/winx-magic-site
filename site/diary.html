<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📔 Мой дневник феи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', cursive;
            background: #f7f0e8;
            background-image: repeating-linear-gradient(45deg, #ffe0f0 0px, #ffe0f0 2px, transparent 2px, transparent 8px);
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .back-btn {
            display: inline-block;
            background: #b77dcc;
            padding: 12px 25px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .diary-card {
            background: #fffef7;
            border-radius: 60px;
            padding: 35px;
            box-shadow: 0 20px 35px rgba(128, 0, 128, 0.15);
            border: 1px solid #ffcddf;
        }
        h1 {
            text-align: center;
            color: #b44b82;
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 35px;
            border: 3px solid #ffbfd5;
            font-family: inherit;
            font-size: 1.1rem;
            min-height: 300px;
            background: #fffbf0;
        }
        .save-diary {
            background: #ff91b5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }
        .magic-note {
            margin-top: 20px;
            text-align: center;
            font-style: italic;
            color: #a16884;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">✨ На главную</a>
        <div class="diary-card">
            <h1>📔 Мой магический дневник</h1>
            <textarea id="diaryText" placeholder="Дорогой дневник... сегодня я выбрала новый образ феи, побывала в Алфее... Запиши свои волшебные мысли! 💖"></textarea>
            <button class="save-diary" id="saveDiaryBtn">💾 Сохранить магические записи 💾</button>
            <p class="magic-note">⭐ Твои записи сохранятся навсегда в твоём браузере ⭐</p>
        </div>
    </div>

    <script>
        const diaryArea = document.getElementById('diaryText');
        const savedDiary = localStorage.getItem('winx_diary');
        if (savedDiary) {
            diaryArea.value = savedDiary;
        }

        document.getElementById('saveDiaryBtn').addEventListener('click', () => {
            localStorage.setItem('winx_diary', diaryArea.value);
            alert('✨ Дневник феи сохранён! ✨');
        });
    </script>
</body>
</html>
